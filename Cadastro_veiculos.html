    <main class="container mt-4 form-container">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-dark text-white text-center py-3">
          <h3 class="mb-0">Cadastro de Novo Veículo</h3>
        </div>
        <div class="card-body p-4">
          <form class="row g-3">
            <div class="col-md-6">
              <label for="modelo" class="form-label fw-bold">Modelo do Veículo</label>
              <input type="text" class="form-control" id="modelo" placeholder="Ex: Onix Plus LTZ" required>
            </div>
            <div class="col-md-6">
              <label for="marca" class="form-label fw-bold">Marca</label>
              <input type="text" class="form-control" id="marca" placeholder="Ex: Chevrolet" required>
            </div>
            <div class="col-md-4">
              <label for="ano" class="form-label fw-bold">Ano</label>
              <input type="number" class="form-control" id="ano" placeholder="2024" required>
            </div>
            <div class="col-md-4">
              <label for="placa" class="form-label fw-bold">Placa</label>
              <input type="text" class="form-control" id="placa" placeholder="ABC-1234" required>
            </div>
            <div class="col-md-4">
              <label for="diaria" class="form-label fw-bold">Valor da Diária (R$)</label>
              <div class="input-group">
                <span class="input-group-text">R$</span>
                <input type="number" step="0.01" class="form-control" id="diaria" placeholder="150.00" required>
              </div>
            </div>
            
            <hr class="mt-5 mb-3">
            
            <div class="col-12 d-flex justify-content-end gap-2">
              <button type="reset" class="btn btn-outline-secondary">Limpar Campos</button>
              <button type="submit" class="btn btn-success px-4">Salvar Veículo</button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script src="assets/dist/js/bootstrap.bundle.min.js"></script>
